optim:
  name: adamw
  lr: 1e-4
  kwargs: {} # TODO add this in default config when created
  

scheduler:
  name: cosine
  kwargs:
    max_lr: ${optim.lr}
    total_steps: 1000

model: 
  name: simple
  kwargs:
    x_size: 5

callbacks:
  use_early_stopping: true
  early_stopping_epochs: 5


num_epochs: 100
batch_size: 64